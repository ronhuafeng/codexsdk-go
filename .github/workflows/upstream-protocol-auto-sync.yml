name: Codex Upstream Protocol Auto Sync

on:
  schedule:
    - cron: "30 10 * * 1-5"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional openai/codex tag, ref, or full SHA. Defaults to the latest stable rust-vX.Y.Z tag."
        required: false
        type: string
      land_ref:
        description: "Branch to update. Defaults to the workflow ref, so manual tmp-branch tests do not have to target main."
        required: false
        type: string
      allow_downgrade:
        description: "Allow an explicit stable rust-vX.Y.Z target older than the current stable-tag baseline."
        required: false
        type: boolean
        default: false
      create_sync_tag:
        description: "Create and push an upstream sync tag after a manual stable-tag sync. Scheduled syncs tag by default."
        required: false
        type: boolean
        default: false
      dispatch_drift_check:
        description: "Dispatch the drift workflow after landing."
        required: false
        type: boolean
        default: true
      open_pr_on_landing_failure:
        description: "Open a draft PR if the temporary branch cannot fast-forward land."
        required: false
        type: boolean
        default: true

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: codex-upstream-protocol-auto-sync-${{ github.event.inputs.land_ref || github.ref_name }}
  cancel-in-progress: false

jobs:
  detect:
    name: Detect drift
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      baseline_sha: ${{ steps.refs.outputs.baseline_sha }}
      drift_sha: ${{ steps.drift.outputs.drift_sha }}
      drift_status: ${{ steps.drift.outputs.status }}
      land_ref: ${{ steps.landing.outputs.land_ref }}
      policy_decision: ${{ steps.target_policy.outputs.decision }}
      policy_reason: ${{ steps.target_policy.outputs.reason }}
      upstream_ref: ${{ steps.refs.outputs.upstream_ref }}
      upstream_ref_kind: ${{ steps.refs.outputs.upstream_ref_kind }}
      upstream_sha: ${{ steps.refs.outputs.upstream_sha }}
      upstream_short_sha: ${{ steps.refs.outputs.upstream_short_sha }}

    steps:
      - name: Resolve landing ref
        id: landing
        env:
          REQUESTED_LAND_REF: ${{ github.event.inputs.land_ref || '' }}
          WORKFLOW_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          land_ref="${REQUESTED_LAND_REF}"
          land_ref="${land_ref#"${land_ref%%[![:space:]]*}"}"
          land_ref="${land_ref%"${land_ref##*[![:space:]]}"}"
          land_ref="${land_ref#refs/heads/}"
          if [[ -z "${land_ref}" ]]; then
            land_ref="${WORKFLOW_REF}"
          fi
          echo "land_ref=${land_ref}" >> "$GITHUB_OUTPUT"
          echo "Landing ref: ${land_ref}" >> "$GITHUB_STEP_SUMMARY"

      - name: Check out landing ref
        uses: actions/checkout@v7
        with:
          ref: ${{ steps.landing.outputs.land_ref }}
          fetch-depth: 0

      - name: Set up Rust
        run: |
          rustup default stable
          rustup show

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            protobuf-compiler

      - name: Resolve upstream target
        id: refs
        env:
          REQUESTED_UPSTREAM_REF: ${{ github.event.inputs.upstream_ref || '' }}
        run: |
          set -euo pipefail
          python3 scripts/codexsdk_resolve_upstream.py \
            --upstream-ref "${REQUESTED_UPSTREAM_REF}" \
            --json > /tmp/codexsdk-upstream-target.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          target = json.loads(Path("/tmp/codexsdk-upstream-target.json").read_text())
          metadata = json.loads(Path("codexsdk/internal/protocolschema/appserver/v2/baseline_metadata.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"upstream_ref={target['upstream_ref']}\n")
              output.write(f"upstream_ref_kind={target['upstream_ref_kind']}\n")
              output.write(f"upstream_sha={target['upstream_sha']}\n")
              output.write(f"upstream_short_sha={target['upstream_sha'][:12]}\n")
              output.write(f"target_explicit={str(target['target_explicit']).lower()}\n")
              output.write(f"baseline_sha={metadata['source_commit']}\n")
          PY

          {
            echo "## Codex upstream protocol auto sync"
            echo
            echo "- Landing ref: \`${{ steps.landing.outputs.land_ref }}\`"
            echo "- Baseline: \`$(python3 -c 'import json; print(json.load(open("codexsdk/internal/protocolschema/appserver/v2/baseline_metadata.json"))["source_commit"])')\`"
            echo "- Upstream target: \`$(jq -r '.upstream_ref' /tmp/codexsdk-upstream-target.json)\` (\`$(jq -r '.upstream_ref_kind' /tmp/codexsdk-upstream-target.json)\`)"
            echo "- Upstream commit: \`$(jq -r '.upstream_sha' /tmp/codexsdk-upstream-target.json)\`"
            echo "- Explicit target: \`$(jq -r '.target_explicit' /tmp/codexsdk-upstream-target.json)\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate target policy
        id: target_policy
        env:
          ALLOW_DOWNGRADE: ${{ github.event.inputs.allow_downgrade || 'false' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          mode="manual"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            mode="scheduled"
          fi

          policy_json="$(
            python3 scripts/codexsdk_target_policy.py \
              --baseline codexsdk/internal/protocolschema/appserver/v2/baseline_metadata.json \
              --target-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --target-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --target-sha "${{ steps.refs.outputs.upstream_sha }}" \
              --target-explicit "${{ steps.refs.outputs.target_explicit }}" \
              --mode "${mode}" \
              --allow-downgrade "${ALLOW_DOWNGRADE}" \
              --json
          )"
          printf '%s\n' "${policy_json}" | tee /tmp/codexsdk-target-policy.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path("/tmp/codexsdk-target-policy.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key in (
                  "decision",
                  "reason",
                  "baseline_ref_name",
                  "baseline_ref_kind",
                  "baseline_commit",
                  "target_ref_name",
                  "target_ref_kind",
                  "target_commit",
                  "target_explicit",
                  "mode",
              ):
                  output.write(f"{key}={policy[key]}\n")
          PY

          {
            echo
            echo "## Target policy"
            echo
            echo "- Decision: \`$(jq -r '.decision' /tmp/codexsdk-target-policy.json)\`"
            echo "- Reason: $(jq -r '.reason' /tmp/codexsdk-target-policy.json)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when target policy blocks sync
        if: steps.target_policy.outputs.decision == 'block'
        run: |
          {
            echo
            echo "Protocol sync was skipped by target policy."
            echo
            echo "Reason: ${{ steps.target_policy.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when baseline is current
        if: steps.target_policy.outputs.decision == 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          label="protocol-drift"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the checked-in baseline already points at the selected upstream Codex target: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`)."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Clone upstream Codex
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          git clone --filter=blob:none --no-checkout https://github.com/openai/codex.git /tmp/openai-codex

      - name: Cache Codex Rust build
        if: steps.target_policy.outputs.decision == 'allow'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            .cache/cargo-target/codex
          key: codex-rust-${{ runner.os }}-${{ steps.refs.outputs.upstream_short_sha }}
          restore-keys: |
            codex-rust-${{ runner.os }}-

      - name: Generate drift report
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          CARGO_TARGET_DIR="$PWD/.cache/cargo-target/codex" \
            scripts/codexsdk_track_upstream.sh \
              --codex-repo /tmp/openai-codex \
              --commit "${{ steps.refs.outputs.upstream_sha }}" \
              --source-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --source-ref-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --out /tmp/codexsdk-upstream

      - name: Capture upstream response mappings
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          git -C /tmp/openai-codex show \
            "${{ steps.refs.outputs.upstream_sha }}:codex-rs/app-server-protocol/src/protocol/common.rs" \
            > /tmp/codexsdk-upstream/common.rs

      - name: Prepare drift issue
        if: steps.target_policy.outputs.decision == 'allow'
        id: drift
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline_sha }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          reports = Path("/tmp/codexsdk-upstream/reports")
          drift_path = reports / "drift_summary.json"
          drift = json.loads(drift_path.read_text())
          drift_sha = hashlib.sha256(drift_path.read_bytes()).hexdigest()

          baseline = os.environ["BASELINE_SHA"]
          upstream_ref = os.environ["UPSTREAM_REF"]
          upstream_ref_kind = os.environ["UPSTREAM_REF_KIND"]
          upstream = os.environ["UPSTREAM_SHA"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          status = drift["status"]
          file_diff = drift["file_diff"]
          method_diff = drift["method_diff"]

          def short_list(items, limit=20):
              if not items:
                  return "_none_"
              lines = [f"- `{item}`" for item in items[:limit]]
              if len(items) > limit:
                  lines.append(f"- ...and {len(items) - limit} more")
              return "\n".join(lines)

          method_lines = []
          for schema, diff in method_diff.items():
              if diff["added"] or diff["removed"]:
                  method_lines.append(f"### {schema}")
                  method_lines.append("")
                  method_lines.append("Added:")
                  method_lines.append(short_list(diff["added"]))
                  method_lines.append("")
                  method_lines.append("Removed:")
                  method_lines.append(short_list(diff["removed"]))
                  method_lines.append("")
          if not method_lines:
              method_lines.append("_No aggregate method additions or removals._")

          upstream_display = f"`{upstream_ref}` (`{upstream}`)"
          title = f"Protocol drift detected against openai/codex {upstream_ref}"
          body = f"""<!-- codexsdk-upstream-sync
          baseline_commit: {baseline}
          upstream_ref: {upstream_ref}
          upstream_ref_kind: {upstream_ref_kind}
          upstream_commit: {upstream}
          drift_sha256: {drift_sha}
          -->

          ## Protocol Drift Detected

          The checked-in Codex app-server schema baseline no longer matches upstream `openai/codex`.

          - Baseline: `openai/codex@{baseline}`
          - Upstream target: {upstream_display}
          - Upstream target kind: `{upstream_ref_kind}`
          - Drift status: `{status}`
          - Drift fingerprint: `{drift_sha}`
          - Workflow run: {run_url}

          ## File Diff

          - Added: {len(file_diff["added"])}
          - Changed: {len(file_diff["changed"])}
          - Removed: {len(file_diff["removed"])}

          ### Added Schemas

          {short_list(file_diff["added"])}

          ### Changed Schemas

          {short_list(file_diff["changed"])}

          ### Removed Schemas

          {short_list(file_diff["removed"])}

          ## Method Diff

          {chr(10).join(method_lines)}

          ## Automated Sync

          This workflow will attempt a guarded Codex sync on a temporary branch, rebase it onto the landing ref, validate it, and land it with a non-force push.
          """

          comment = f"""Protocol drift is still present.

          - Baseline: `openai/codex@{baseline}`
          - Upstream target: {upstream_display}
          - Upstream target kind: `{upstream_ref_kind}`
          - Drift status: `{status}`
          - Drift fingerprint: `{drift_sha}`
          - Workflow run: {run_url}
          """

          Path("/tmp/codexsdk-upstream/issue-title.txt").write_text(title + "\n")
          Path("/tmp/codexsdk-upstream/issue-body.md").write_text(body)
          Path("/tmp/codexsdk-upstream/issue-comment.md").write_text(comment)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"status={status}\n")
              output.write(f"drift_sha={drift_sha}\n")
          PY

      - name: Upload sync candidate artifacts
        if: steps.target_policy.outputs.decision == 'allow'
        uses: actions/upload-artifact@v7
        with:
          name: codex-upstream-sync-candidate-${{ steps.refs.outputs.upstream_sha }}
          path: /tmp/codexsdk-upstream
          if-no-files-found: error

      - name: Update workflow summary
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          {
            echo
            echo "## Drift report"
            echo
            echo "- Drift status: \`${{ steps.drift.outputs.status }}\`"
            echo "- Drift fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`"
            echo
            cat /tmp/codexsdk-upstream/reports/SUMMARY.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when drift is clean
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'clean'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          label="protocol-drift"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the selected upstream target has no schema drift. Upstream: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`); fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create or update drift issue
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          label="protocol-drift"
          gh label create "$label" \
            --description "Upstream Codex app-server protocol drift needs review" \
            --color "BFDADC" \
            --force

          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"
          if [[ -n "$issue_number" ]]; then
            existing_drift_sha="$(
              gh issue view "$issue_number" \
                --json body \
                --jq '.body' \
                | sed -n 's/^[[:space:]]*drift_sha256: //p' \
                | head -n 1 \
                | tr -d '\r'
            )"
            title="$(cat /tmp/codexsdk-upstream/issue-title.txt)"
            gh issue edit "$issue_number" \
              --title "$title" \
              --body-file /tmp/codexsdk-upstream/issue-body.md
            if [[ "$existing_drift_sha" == "${{ steps.drift.outputs.drift_sha }}" ]]; then
              echo "Updated existing drift issue #${issue_number}; fingerprint unchanged, so no comment was added." >> "$GITHUB_STEP_SUMMARY"
            else
              gh issue comment "$issue_number" --body-file /tmp/codexsdk-upstream/issue-comment.md
              echo "Updated existing drift issue #${issue_number} and added a comment for the new fingerprint." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            title="$(cat /tmp/codexsdk-upstream/issue-title.txt)"
            new_issue_url="$(
              gh issue create \
                --title "$title" \
                --body-file /tmp/codexsdk-upstream/issue-body.md \
                --label "$label"
            )"
            echo "Created drift issue: ${new_issue_url}" >> "$GITHUB_STEP_SUMMARY"
          fi

  sync:
    name: Sync and land
    needs: detect
    if: needs.detect.outputs.policy_decision == 'allow' && needs.detect.outputs.drift_status == 'review-required'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    outputs:
      fallback_pr_url: ${{ steps.land.outputs.fallback_pr_url }}
      landed_commit: ${{ steps.land.outputs.landed_commit }}
      landed_ref: ${{ steps.land.outputs.landed_ref }}
      work_branch: ${{ steps.branch.outputs.work_branch }}

    steps:
      - name: Check out landing ref
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.detect.outputs.land_ref }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Rust
        run: |
          rustup default stable
          rustup show

      - name: Cache Codex Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            .cache/cargo-target/codex
          key: codex-rust-${{ runner.os }}-${{ needs.detect.outputs.upstream_short_sha }}
          restore-keys: |
            codex-rust-${{ runner.os }}-

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libasound2-dev \
            libssl-dev \
            pkg-config \
            protobuf-compiler

      - name: Download sync candidate artifacts
        uses: actions/download-artifact@v7
        with:
          name: codex-upstream-sync-candidate-${{ needs.detect.outputs.upstream_sha }}
          path: .cache/codexsdk-upstream-${{ needs.detect.outputs.upstream_short_sha }}

      - name: Configure git identity
        run: |
          git config user.name "codexsdk-sync-bot"
          git config user.email "codexsdk-sync-bot@users.noreply.github.com"

      - name: Create temporary sync branch
        id: branch
        env:
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
        run: |
          set -euo pipefail
          safe_ref="$(
            python3 - <<'PY'
          import os
          import re
          ref = os.environ["UPSTREAM_REF"]
          safe = re.sub(r"[^A-Za-z0-9._-]+", "-", ref).strip("-")
          print(safe or "manual-target")
          PY
          )"
          work_branch="codex/sync-openai-codex-${safe_ref}-${GITHUB_RUN_ID}"
          git switch -c "${work_branch}"
          echo "work_branch=${work_branch}" >> "$GITHUB_OUTPUT"
          echo "Temporary work branch: \`${work_branch}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Apply sync candidate mechanically
        env:
          CANDIDATE_DIR: .cache/codexsdk-upstream-${{ needs.detect.outputs.upstream_short_sha }}
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ needs.detect.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p .cache/codexsdk-auto-sync
          python3 scripts/codexsdk_apply_sync_candidate.py \
            --candidate "${CANDIDATE_DIR}/schema" \
            --reports "${CANDIDATE_DIR}/reports" \
            --common-rs "${CANDIDATE_DIR}/common.rs" \
            --target-ref "${UPSTREAM_REF}" \
            --target-kind "${UPSTREAM_REF_KIND}" \
            --target-sha "${UPSTREAM_SHA}" \
            --json | tee .cache/codexsdk-auto-sync/apply-result.json
          git diff --name-status > .cache/codexsdk-auto-sync/diff-name-status.txt

      - name: Build Codex sync prompt
        env:
          CANDIDATE_DIR: .cache/codexsdk-upstream-${{ needs.detect.outputs.upstream_short_sha }}
          LAND_REF: ${{ needs.detect.outputs.land_ref }}
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ needs.detect.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
          WORK_BRANCH: ${{ steps.branch.outputs.work_branch }}
        run: |
          set -euo pipefail
          mkdir -p .cache/codexsdk-auto-sync
          cat > .cache/codexsdk-auto-sync/prompt.md <<EOF
          You are maintaining codexsdk-go.

          Read and follow .agents/skills/codexsdk-sync-upstream/SKILL.md completely before editing.

          This workflow has already applied the large mechanical sync with scripts/codexsdk_apply_sync_candidate.py. Perform a bounded maintainer review of the resulting worktree for this already-resolved upstream target:

          - upstream ref: ${UPSTREAM_REF}
          - upstream ref kind: ${UPSTREAM_REF_KIND}
          - upstream commit: ${UPSTREAM_SHA}
          - landing ref: ${LAND_REF}
          - temporary work branch: ${WORK_BRANCH}

          Candidate schema and drift artifacts from this workflow's detect job are already available under:

          - ${CANDIDATE_DIR}/schema
          - ${CANDIDATE_DIR}/reports
          - ${CANDIDATE_DIR}/common.rs

          Mechanical apply summary:

          - .cache/codexsdk-auto-sync/apply-result.json
          - .cache/codexsdk-auto-sync/diff-name-status.txt

          Inspect the apply summary, compact drift reports, and git diff name-status. Confirm there is no obvious provenance, sanitization, manifest, coverage, or generated-code issue. Do not re-copy schemas, re-run the full Rust schema generator, or print large files. Do not try to manually review every generated JSON or Go line.

          Leave the current worktree changes in place. Make only small, clearly necessary fixes if the review finds a concrete issue. Do not commit, tag, push, create a PR, dispatch workflows, or close issues. The workflow will validate, commit, rebase, land, tag, and dispatch follow-up checks after you finish.

          Keep command output compact. Do not print full schema, report, manifest, coverage, or generated Go files. Avoid chained shell commands because the action sandbox may reject them; run separate focused commands instead.

          Keep handwritten SDK changes minimal and justify them through reviewed drift. Leave newly discovered experimental or internal upstream surface in generated protocolv2 unless the manifest rules require public SDK exposure.
          EOF

      - name: Run Codex upstream sync
        uses: openai/codex-action@v1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/.cache/cargo-target/codex
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
          model: ${{ secrets.CODEX_MODEL }}
          prompt-file: .cache/codexsdk-auto-sync/prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-bots: "true"
          codex-args: '["--ephemeral"]'

      - name: Validate sync before commit
        env:
          CANDIDATE_DIR: .cache/codexsdk-upstream-${{ needs.detect.outputs.upstream_short_sha }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          scripts/codexsdk_validate_sync.sh \
            --candidate "${CANDIDATE_DIR}/schema" \
            --target-sha "${UPSTREAM_SHA}"

      - name: Commit sync changes
        env:
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ needs.detect.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          git diff --name-status
          if git diff --quiet; then
            echo "Codex sync produced no file changes while drift was review-required." >&2
            exit 1
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No staged sync changes are available to commit." >&2
            exit 1
          fi
          git commit \
            -m "Sync Codex protocol baseline to ${UPSTREAM_REF}" \
            -m "Upstream-ref: ${UPSTREAM_REF}" \
            -m "Upstream-ref-kind: ${UPSTREAM_REF_KIND}" \
            -m "Upstream-commit: ${UPSTREAM_SHA}"

      - name: Pre-main gate and land
        id: land
        env:
          CANDIDATE_DIR: .cache/codexsdk-upstream-${{ needs.detect.outputs.upstream_short_sha }}
          LAND_REF: ${{ needs.detect.outputs.land_ref }}
          OPEN_PR_ON_FAILURE: ${{ github.event.inputs.open_pr_on_landing_failure || 'true' }}
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
          WORK_BRANCH: ${{ steps.branch.outputs.work_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          args=(
            --land-ref "${LAND_REF}"
            --work-branch "${WORK_BRANCH}"
            --target-ref "${UPSTREAM_REF}"
            --target-sha "${UPSTREAM_SHA}"
            --candidate "${CANDIDATE_DIR}/schema"
          )
          if [[ "${OPEN_PR_ON_FAILURE}" == "true" ]]; then
            args+=(--open-pr-on-failure)
          fi
          scripts/codexsdk_land_sync.sh "${args[@]}"

  finalize:
    name: Finalize landed sync
    needs:
      - detect
      - sync
    if: needs.sync.outputs.landed_commit != ''
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out landed commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.sync.outputs.landed_ref }}
          fetch-depth: 0

      - name: Check out exact landed commit
        run: |
          git checkout --detach "${{ needs.sync.outputs.landed_commit }}"

      - name: Create upstream sync tag
        id: tag
        if: needs.detect.outputs.upstream_ref_kind == 'stable_rust_tag' && (github.event_name == 'schedule' || github.event.inputs.create_sync_tag == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git fetch --tags origin
          if python3 scripts/codexsdk_sync_tag.py --create --push origin --json > /tmp/codexsdk-sync-tag.json; then
            :
          else
            python3 scripts/codexsdk_sync_tag.py --next-suffix --create --push origin --json > /tmp/codexsdk-sync-tag.json
          fi
          tag_name="$(jq -r '.tag_name' /tmp/codexsdk-sync-tag.json)"
          action="$(jq -r '.action' /tmp/codexsdk-sync-tag.json)"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"
          {
            echo "## Upstream sync tag"
            echo
            echo "- Tag: \`${tag_name}\`"
            echo "- Action: \`${action}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Dispatch drift verification
        if: (github.event.inputs.dispatch_drift_check || 'true') == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LANDED_COMMIT: ${{ needs.sync.outputs.landed_commit }}
          LANDED_REF: ${{ needs.sync.outputs.landed_ref }}
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
        run: |
          set -euo pipefail
          gh workflow run upstream-protocol-drift.yml \
            --ref "${LANDED_REF}" \
            -f "upstream_ref=${UPSTREAM_REF}"

          run_id=""
          for _ in $(seq 1 24); do
            run_id="$(
              gh run list \
                --workflow upstream-protocol-drift.yml \
                --branch "${LANDED_REF}" \
                --limit 20 \
                --json databaseId,headSha \
                --jq ".[] | select(.headSha == \"${LANDED_COMMIT}\") | .databaseId" |
                head -n 1
            )"
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 5
          done
          if [[ -z "${run_id}" ]]; then
            echo "Unable to find dispatched drift workflow run for ${LANDED_REF}@${LANDED_COMMIT}." >&2
            exit 1
          fi
          echo "Dispatched drift workflow run: ${run_id}" >> "$GITHUB_STEP_SUMMARY"
          gh run watch "${run_id}" --exit-status

      - name: Report final sync outcome
        env:
          LANDED_COMMIT: ${{ needs.sync.outputs.landed_commit }}
          LANDED_REF: ${{ needs.sync.outputs.landed_ref }}
          TAG_NAME: ${{ steps.tag.outputs.tag_name }}
          UPSTREAM_REF: ${{ needs.detect.outputs.upstream_ref }}
          UPSTREAM_SHA: ${{ needs.detect.outputs.upstream_sha }}
          WORK_BRANCH: ${{ needs.sync.outputs.work_branch }}
        run: |
          {
            echo
            echo "## Sync landed"
            echo
            echo "- Landing ref: \`${LANDED_REF}\`"
            echo "- Landed commit: \`${LANDED_COMMIT}\`"
            echo "- Temporary branch: \`${WORK_BRANCH}\`"
            echo "- Upstream target: \`${UPSTREAM_REF}\`"
            echo "- Upstream commit: \`${UPSTREAM_SHA}\`"
            if [[ -n "${TAG_NAME}" ]]; then
              echo "- Sync tag: \`${TAG_NAME}\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
