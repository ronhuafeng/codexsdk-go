name: Codex Upstream Protocol Fix
run-name: "Protocol fix ${{ inputs.upstream_ref || inputs.issue_number || 'manual target' }} -> PR"

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Optional protocol-drift issue number containing authoritative target metadata."
        required: false
        type: string
      upstream_ref:
        description: "Optional openai/codex tag, ref, or full SHA. Required when issue_number is omitted."
        required: false
        type: string
      upstream_sha:
        description: "Optional expected peeled upstream commit SHA. When set, the resolver must match it."
        required: false
        type: string
      drift_sha:
        description: "Optional expected drift fingerprint. When set, regenerated drift artifacts must match it."
        required: false
        type: string
      land_ref:
        description: "Optional landing branch for the sync PR. Only the repository default branch is accepted."
        required: false
        type: string
      allow_downgrade:
        description: "Allow an explicit stable rust-vX.Y.Z target older than the current stable-tag baseline."
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

env:
  CODEX_UPSTREAM_COMMON_RS: codex-rs/app-server-protocol/src/protocol/common.rs
  CODEX_UPSTREAM_REPO: https://github.com/openai/codex.git
  CODEXSDK_AUTO_SYNC_DIR: .cache/codexsdk-auto-sync
  CODEXSDK_DRIFT_ARTIFACT_DIR: /tmp/codexsdk-upstream
  CODEXSDK_RUST_TARGET_DIR: .cache/cargo-target/codex
  CODEXSDK_SCHEMA_BASELINE: codexsdk/internal/protocolschema/appserver/v2
  CODEXSDK_SYNC_BRANCH_PREFIX: codex/sync-upstream
  CODEXSDK_TARGET_POLICY_JSON: /tmp/codexsdk-target-policy.json
  CODEXSDK_UPSTREAM_CLONE: /tmp/openai-codex
  CODEXSDK_UPSTREAM_TARGET_JSON: /tmp/codexsdk-upstream-target.json

concurrency:
  group: codex-upstream-protocol-fix
  cancel-in-progress: false

jobs:
  fix:
    name: Generate sync PR
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      issues: read
      pull-requests: write

    steps:
      - name: Guard control-plane ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "Refusing to run fix control plane from ${GITHUB_REF_NAME}; use ${DEFAULT_BRANCH}." >&2
            exit 1
          fi

      - name: Check out control-plane ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Resolve landing ref
        id: landing
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          INPUT_LAND_REF: ${{ inputs.land_ref || '' }}
        run: |
          set -euo pipefail

          land_ref="${INPUT_LAND_REF:-${DEFAULT_BRANCH}}"
          land_ref="${land_ref#refs/heads/}"
          if [[ "${land_ref}" != "${DEFAULT_BRANCH}" ]]; then
            echo "Refusing landing ref ${land_ref}; upstream protocol sync PRs may target only ${DEFAULT_BRANCH}." >&2
            exit 1
          fi
          echo "land_ref=${land_ref}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Read drift issue metadata
        id: issue
        if: inputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
        run: |
          set -euo pipefail

          gh issue view "${ISSUE_NUMBER}" --json body,url --jq '.body' > /tmp/codexsdk-drift-issue-body.md
          gh issue view "${ISSUE_NUMBER}" --json url --jq '.url' > /tmp/codexsdk-drift-issue-url.txt

          python3 - <<'PY'
          import os
          import re
          import sys
          from pathlib import Path

          body = Path("/tmp/codexsdk-drift-issue-body.md").read_text(encoding="utf-8")
          match = re.search(r"<!--\s*codexsdk-upstream-sync\s*(.*?)-->", body, re.S)
          if match is None:
              print("protocol-drift issue is missing codexsdk-upstream-sync metadata", file=sys.stderr)
              raise SystemExit(1)

          metadata = {}
          for raw_line in match.group(1).splitlines():
              line = raw_line.strip()
              if not line or ":" not in line:
                  continue
              key, value = line.split(":", 1)
              metadata[key.strip()] = value.strip()

          required = ("upstream_ref", "upstream_ref_kind", "upstream_commit", "drift_sha256")
          missing = [key for key in required if not metadata.get(key)]
          if missing:
              print(f"protocol-drift issue metadata missing: {', '.join(missing)}", file=sys.stderr)
              raise SystemExit(1)

          issue_url = Path("/tmp/codexsdk-drift-issue-url.txt").read_text(encoding="utf-8").strip()
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"issue_url={issue_url}\n")
              for key in ("baseline_commit", "upstream_ref", "upstream_ref_kind", "upstream_commit", "drift_sha256"):
                  output.write(f"{key}={metadata.get(key, '')}\n")
          PY

      - name: Resolve requested sync target
        id: requested
        env:
          INPUT_DRIFT_SHA: ${{ inputs.drift_sha || '' }}
          INPUT_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          INPUT_UPSTREAM_REF: ${{ inputs.upstream_ref || '' }}
          INPUT_UPSTREAM_SHA: ${{ inputs.upstream_sha || '' }}
          ISSUE_DRIFT_SHA: ${{ steps.issue.outputs.drift_sha256 || '' }}
          ISSUE_UPSTREAM_REF: ${{ steps.issue.outputs.upstream_ref || '' }}
          ISSUE_UPSTREAM_REF_KIND: ${{ steps.issue.outputs.upstream_ref_kind || '' }}
          ISSUE_UPSTREAM_SHA: ${{ steps.issue.outputs.upstream_commit || '' }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import os
          import sys

          upstream_ref = os.environ["INPUT_UPSTREAM_REF"] or os.environ["ISSUE_UPSTREAM_REF"]
          expected_upstream_sha = os.environ["INPUT_UPSTREAM_SHA"] or os.environ["ISSUE_UPSTREAM_SHA"]
          expected_upstream_ref_kind = os.environ["ISSUE_UPSTREAM_REF_KIND"]
          expected_drift_sha = os.environ["INPUT_DRIFT_SHA"] or os.environ["ISSUE_DRIFT_SHA"]

          if not upstream_ref:
              print("upstream_ref is required when issue_number is omitted or issue metadata is unavailable", file=sys.stderr)
              raise SystemExit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"requested_upstream_ref={upstream_ref}\n")
              output.write(f"expected_upstream_sha={expected_upstream_sha}\n")
              output.write(f"expected_upstream_ref_kind={expected_upstream_ref_kind}\n")
              output.write(f"expected_drift_sha={expected_drift_sha}\n")
              output.write(f"issue_number={os.environ['INPUT_ISSUE_NUMBER']}\n")
          PY

      - name: Resolve upstream target
        id: refs
        env:
          EXPECTED_UPSTREAM_REF_KIND: ${{ steps.requested.outputs.expected_upstream_ref_kind }}
          EXPECTED_UPSTREAM_SHA: ${{ steps.requested.outputs.expected_upstream_sha }}
          REQUESTED_UPSTREAM_REF: ${{ steps.requested.outputs.requested_upstream_ref }}
        run: |
          set -euo pipefail

          python3 scripts/codexsdk_resolve_upstream.py \
            --remote "${CODEX_UPSTREAM_REPO}" \
            --upstream-ref "${REQUESTED_UPSTREAM_REF}" \
            --json > "${CODEXSDK_UPSTREAM_TARGET_JSON}"

          python3 - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          target = json.loads(Path(os.environ["CODEXSDK_UPSTREAM_TARGET_JSON"]).read_text())
          metadata = json.loads(Path(os.environ["CODEXSDK_SCHEMA_BASELINE"], "baseline_metadata.json").read_text())
          expected_sha = os.environ["EXPECTED_UPSTREAM_SHA"]
          expected_kind = os.environ["EXPECTED_UPSTREAM_REF_KIND"]
          if expected_sha and target["upstream_sha"] != expected_sha:
              print(
                  f"resolved upstream SHA {target['upstream_sha']} does not match expected {expected_sha}",
                  file=sys.stderr,
              )
              raise SystemExit(1)
          if expected_kind and target["upstream_ref_kind"] != expected_kind:
              print(
                  f"resolved upstream kind {target['upstream_ref_kind']} does not match issue kind {expected_kind}",
                  file=sys.stderr,
              )
              raise SystemExit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"upstream_ref={target['upstream_ref']}\n")
              output.write(f"upstream_ref_kind={target['upstream_ref_kind']}\n")
              output.write(f"upstream_sha={target['upstream_sha']}\n")
              output.write(f"upstream_short_sha={target['upstream_sha'][:12]}\n")
              output.write(f"target_explicit={str(target['target_explicit']).lower()}\n")
              output.write(f"baseline_sha={metadata['source_commit']}\n")
          PY

          {
            echo "## Codex upstream protocol fix"
            echo
            echo "- Current phase: \`fix\`"
            echo "- Landing ref: \`${{ steps.landing.outputs.land_ref }}\`"
            echo "- Issue: \`${{ steps.requested.outputs.issue_number || 'none' }}\`"
            echo "- Baseline: \`$(python3 -c 'import json, os; print(json.load(open(os.environ["CODEXSDK_SCHEMA_BASELINE"] + "/baseline_metadata.json"))["source_commit"])')\`"
            echo "- Upstream target: \`$(jq -r '.upstream_ref' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\` (\`$(jq -r '.upstream_ref_kind' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\`)"
            echo "- Upstream commit: \`$(jq -r '.upstream_sha' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\`"
            echo "- Expected drift fingerprint: \`${{ steps.requested.outputs.expected_drift_sha || 'not provided' }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate target policy
        id: target_policy
        env:
          ALLOW_DOWNGRADE: ${{ inputs.allow_downgrade || false }}
        run: |
          set -euo pipefail

          policy_json="$(
            python3 scripts/codexsdk_target_policy.py \
              --baseline "${CODEXSDK_SCHEMA_BASELINE}/baseline_metadata.json" \
              --target-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --target-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --target-sha "${{ steps.refs.outputs.upstream_sha }}" \
              --target-explicit "${{ steps.refs.outputs.target_explicit }}" \
              --mode "manual" \
              --allow-downgrade "${ALLOW_DOWNGRADE}" \
              --json
          )"
          printf '%s\n' "${policy_json}" | tee "${CODEXSDK_TARGET_POLICY_JSON}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path(os.environ["CODEXSDK_TARGET_POLICY_JSON"]).read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"decision={policy['decision']}\n")
              output.write(f"reason={policy['reason']}\n")
          PY

          {
            echo
            echo "## Target policy"
            echo
            echo "- Decision: \`$(jq -r '.decision' "${CODEXSDK_TARGET_POLICY_JSON}")\`"
            echo "- Reason: $(jq -r '.reason' "${CODEXSDK_TARGET_POLICY_JSON}")"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when target policy blocks fix
        if: steps.target_policy.outputs.decision == 'block'
        run: |
          {
            echo
            echo "Protocol fix stopped before generating a candidate."
            echo "Reason: ${{ steps.target_policy.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when baseline is already current
        if: steps.target_policy.outputs.decision == 'skip'
        run: |
          {
            echo
            echo "No fix PR was created because the checked-in baseline already points at ${{ steps.refs.outputs.upstream_ref }} (${{ steps.refs.outputs.upstream_sha }})."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Clone upstream Codex
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          git clone --filter=blob:none --no-checkout "${CODEX_UPSTREAM_REPO}" "${CODEXSDK_UPSTREAM_CLONE}"

      - name: Set up Codex Rust
        if: steps.target_policy.outputs.decision == 'allow'
        uses: ./.github/actions/setup-codex-rust
        with:
          cache-key-suffix: ${{ steps.refs.outputs.upstream_short_sha }}
          target-dir: ${{ env.CODEXSDK_RUST_TARGET_DIR }}

      - name: Generate drift candidate
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          CARGO_TARGET_DIR="$PWD/${CODEXSDK_RUST_TARGET_DIR}" \
            scripts/codexsdk_track_upstream.sh \
              --codex-repo "${CODEXSDK_UPSTREAM_CLONE}" \
              --commit "${{ steps.refs.outputs.upstream_sha }}" \
              --source-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --source-ref-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --out "${CODEXSDK_DRIFT_ARTIFACT_DIR}"

      - name: Capture upstream response mappings
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          git -C "${CODEXSDK_UPSTREAM_CLONE}" show \
            "${{ steps.refs.outputs.upstream_sha }}:${CODEX_UPSTREAM_COMMON_RS}" \
            > "${CODEXSDK_DRIFT_ARTIFACT_DIR}/common.rs"
          printf '%s\n' "${{ steps.refs.outputs.upstream_sha }}" \
            > "${CODEXSDK_DRIFT_ARTIFACT_DIR}/common.rs.source_sha"

      - name: Prepare regenerated drift metadata
        if: steps.target_policy.outputs.decision == 'allow'
        id: drift
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          python3 scripts/codexsdk_write_drift_issue_artifacts.py \
            --artifact-dir "${CODEXSDK_DRIFT_ARTIFACT_DIR}" \
            --baseline-sha "${BASELINE_SHA}" \
            --run-url "${RUN_URL}" \
            --upstream-ref "${UPSTREAM_REF}" \
            --upstream-ref-kind "${UPSTREAM_REF_KIND}" \
            --upstream-sha "${UPSTREAM_SHA}"

      - name: Verify regenerated candidate fingerprint
        if: steps.target_policy.outputs.decision == 'allow'
        env:
          ACTUAL_DRIFT_SHA: ${{ steps.drift.outputs.drift_sha }}
          DRIFT_STATUS: ${{ steps.drift.outputs.status }}
          EXPECTED_DRIFT_SHA: ${{ steps.requested.outputs.expected_drift_sha }}
        run: |
          set -euo pipefail

          if [[ -n "${EXPECTED_DRIFT_SHA}" && "${ACTUAL_DRIFT_SHA}" != "${EXPECTED_DRIFT_SHA}" ]]; then
            echo "Regenerated drift fingerprint ${ACTUAL_DRIFT_SHA} does not match expected ${EXPECTED_DRIFT_SHA}." >&2
            echo "Run the drift detect workflow again before publishing a fix PR." >&2
            exit 1
          fi

          if [[ "${DRIFT_STATUS}" != "review-required" ]]; then
            {
              echo
              echo "No sync PR will be created because regenerated drift status is \`${DRIFT_STATUS}\`."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload regenerated candidate evidence
        if: steps.target_policy.outputs.decision == 'allow'
        uses: actions/upload-artifact@v7
        with:
          name: codex-upstream-fix-candidate-${{ steps.refs.outputs.upstream_sha }}-${{ steps.drift.outputs.drift_sha }}
          path: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          if-no-files-found: error

      - name: Configure git identity
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        run: |
          git config user.name "codexsdk-sync-bot"
          git config user.email "codexsdk-sync-bot@users.noreply.github.com"

      - name: Apply sync candidate mechanically
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${CODEXSDK_AUTO_SYNC_DIR}"
          python3 scripts/codexsdk_apply_sync_candidate.py \
            --candidate "${CANDIDATE_DIR}/schema" \
            --codex-repo "${CODEXSDK_UPSTREAM_CLONE}" \
            --reports "${CANDIDATE_DIR}/reports" \
            --common-rs "${CANDIDATE_DIR}/common.rs" \
            --common-rs-source-sha "${UPSTREAM_SHA}" \
            --target-ref "${UPSTREAM_REF}" \
            --target-kind "${UPSTREAM_REF_KIND}" \
            --target-sha "${UPSTREAM_SHA}" \
            --json | tee "${CODEXSDK_AUTO_SYNC_DIR}/apply-result.json"
          git diff --name-status > "${CODEXSDK_AUTO_SYNC_DIR}/diff-name-status.txt"

      - name: Build Codex drift repair prompt
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          LAND_REF: ${{ steps.landing.outputs.land_ref }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${CODEXSDK_AUTO_SYNC_DIR}"
          python3 scripts/codexsdk_write_sync_prompt.py \
            --out "${CODEXSDK_AUTO_SYNC_DIR}/prompt.md" \
            --auto-sync-dir "${CODEXSDK_AUTO_SYNC_DIR}" \
            --candidate-dir "${CANDIDATE_DIR}" \
            --land-ref "${LAND_REF}" \
            --phase "fix" \
            --upstream-ref "${UPSTREAM_REF}" \
            --upstream-ref-kind "${UPSTREAM_REF_KIND}" \
            --upstream-sha "${UPSTREAM_SHA}"

      - name: Run Codex drift repair agent
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        uses: openai/codex-action@v1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/${{ env.CODEXSDK_RUST_TARGET_DIR }}
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
          model: ${{ secrets.CODEX_MODEL }}
          prompt-file: ${{ env.CODEXSDK_AUTO_SYNC_DIR }}/prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-bots: "true"
          codex-args: '["--ephemeral"]'

      - name: Validate sync before commit
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          scripts/codexsdk_validate_sync.sh \
            --candidate "${CANDIDATE_DIR}/schema" \
            --target-sha "${UPSTREAM_SHA}"

      - name: Commit local sync changes
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          echo "Using codexsdk-sync-upstream command: commit-local-sync."
          git diff --name-status
          if git diff --quiet; then
            echo "Codex sync produced no file changes while drift was review-required." >&2
            exit 1
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No staged sync changes are available to commit." >&2
            exit 1
          fi
          git commit \
            -m "Sync Codex protocol baseline to ${UPSTREAM_REF}" \
            -m "Upstream-ref: ${UPSTREAM_REF}" \
            -m "Upstream-ref-kind: ${UPSTREAM_REF_KIND}" \
            -m "Upstream-commit: ${UPSTREAM_SHA}"

      - name: Publish protected sync PR
        id: publish
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          DRIFT_SHA: ${{ steps.drift.outputs.drift_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.requested.outputs.issue_number }}
          LAND_REF: ${{ steps.landing.outputs.land_ref }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          args=(
            --land-ref "${LAND_REF}"
            --default-branch "${DEFAULT_BRANCH}"
            --branch-prefix "${CODEXSDK_SYNC_BRANCH_PREFIX}"
            --target-ref "${UPSTREAM_REF}"
            --target-kind "${UPSTREAM_REF_KIND}"
            --target-sha "${UPSTREAM_SHA}"
            --drift-sha "${DRIFT_SHA}"
            --candidate "${CANDIDATE_DIR}/schema"
          )
          if [[ -n "${ISSUE_NUMBER}" ]]; then
            args+=(--issue-number "${ISSUE_NUMBER}")
          fi
          scripts/codexsdk_publish_sync_pr.sh "${args[@]}"

      - name: Report fix outcome
        if: steps.publish.outputs.pr_url != ''
        env:
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          SYNC_BRANCH: ${{ steps.publish.outputs.sync_branch }}
          SYNC_COMMIT: ${{ steps.publish.outputs.sync_commit }}
        run: |
          {
            echo
            echo "## Sync PR published"
            echo
            echo "- Completion layer: \`sync PR published\`"
            echo "- Sync branch: \`${SYNC_BRANCH}\`"
            echo "- Sync commit: \`${SYNC_COMMIT}\`"
            echo "- Sync PR: ${PR_URL}"
            echo
            echo "The fix workflow stops here. Branch protection, the required \`Go\` check, and repository auto-merge rules own the merge decision. Run the finalize workflow after the PR lands."
          } >> "$GITHUB_STEP_SUMMARY"
