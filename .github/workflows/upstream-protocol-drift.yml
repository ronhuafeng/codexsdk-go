name: Codex Upstream Protocol Drift
run-name: Protocol drift ${{ inputs.upstream_ref || 'latest stable' }}

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional openai/codex tag, ref, or full SHA. Defaults to the latest stable rust-vX.Y.Z tag."
        required: false
        type: string
      allow_downgrade:
        description: "Allow an explicit stable rust-vX.Y.Z target older than the current stable-tag baseline."
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

env:
  CODEX_UPSTREAM_REPO: https://github.com/openai/codex.git
  CODEXSDK_DRIFT_ARTIFACT_DIR: /tmp/codexsdk-upstream
  CODEXSDK_DRIFT_LABEL: protocol-drift
  CODEXSDK_RUST_TARGET_DIR: .cache/cargo-target/codex
  CODEXSDK_SCHEMA_BASELINE: codexsdk/internal/protocolschema/appserver/v2
  CODEXSDK_TARGET_POLICY_JSON: /tmp/codexsdk-target-policy.json
  CODEXSDK_UPSTREAM_CLONE: /tmp/openai-codex

concurrency:
  group: codex-upstream-protocol-drift
  queue: max
  cancel-in-progress: false

jobs:
  detect:
    name: Detect protocol drift
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      issues: write

    steps:
      - name: Check out
        uses: actions/checkout@v7

      - name: Resolve upstream baseline
        id: refs
        env:
          REQUESTED_UPSTREAM_REF: ${{ inputs.upstream_ref || '' }}
        run: |
          set -euo pipefail

          remote="${CODEX_UPSTREAM_REPO}"
          requested_ref="${REQUESTED_UPSTREAM_REF}"
          requested_ref="${requested_ref#"${requested_ref%%[![:space:]]*}"}"
          requested_ref="${requested_ref%"${requested_ref##*[![:space:]]}"}"

          if [[ -n "${requested_ref}" ]]; then
            upstream_ref="${requested_ref}"
            target_explicit="true"
            if [[ "${requested_ref}" =~ ^rust-v[0-9]+[.][0-9]+[.][0-9]+$ ]]; then
              upstream_ref_kind="stable_rust_tag"
            elif [[ "${requested_ref}" =~ ^[0-9a-f]{40}$ ]]; then
              upstream_ref_kind="manual_commit"
            else
              upstream_ref_kind="manual_ref"
            fi
          else
            upstream_ref="$(
              git ls-remote --tags --refs "${remote}" 'refs/tags/rust-v*' \
                | awk '{print $2}' \
                | sed 's#refs/tags/##' \
                | grep -E '^rust-v[0-9]+[.][0-9]+[.][0-9]+$' \
                | sort -V \
                | tail -n 1
            )"
            target_explicit="false"
            upstream_ref_kind="stable_rust_tag"
          fi

          if [[ -z "${upstream_ref}" ]]; then
            echo "Unable to resolve an upstream rust-vX.Y.Z tag." >&2
            exit 1
          fi

          resolve_remote_ref() {
            local ref="$1"
            local sha=""
            if [[ "${ref}" =~ ^[0-9a-f]{40}$ ]]; then
              printf '%s\n' "${ref}"
              return 0
            fi
            for candidate in \
              "refs/tags/${ref}^{}" \
              "${ref}^{}" \
              "refs/tags/${ref}" \
              "refs/heads/${ref}" \
              "${ref}"
            do
              sha="$(git ls-remote "${remote}" "${candidate}" | awk 'NR == 1 {print $1}')"
              if [[ -n "${sha}" ]]; then
                printf '%s\n' "${sha}"
                return 0
              fi
            done
            return 1
          }

          if ! upstream_sha="$(resolve_remote_ref "${upstream_ref}")"; then
            echo "Unable to resolve upstream ref in openai/codex: ${upstream_ref}" >&2
            exit 1
          fi
          baseline_sha="$(python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          metadata = json.loads(Path(os.environ["CODEXSDK_SCHEMA_BASELINE"], "baseline_metadata.json").read_text())
          print(metadata["source_commit"])
          PY
          )"

          echo "upstream_ref=${upstream_ref}" >> "$GITHUB_OUTPUT"
          echo "upstream_ref_kind=${upstream_ref_kind}" >> "$GITHUB_OUTPUT"
          echo "upstream_sha=${upstream_sha}" >> "$GITHUB_OUTPUT"
          echo "upstream_short_sha=${upstream_sha:0:12}" >> "$GITHUB_OUTPUT"
          echo "baseline_sha=${baseline_sha}" >> "$GITHUB_OUTPUT"
          echo "target_explicit=${target_explicit}" >> "$GITHUB_OUTPUT"

          {
            echo "## Codex upstream protocol drift"
            echo
            echo "- Baseline: \`${baseline_sha}\`"
            echo "- Upstream target: \`${upstream_ref}\` (${upstream_ref_kind})"
            echo "- Upstream commit: \`${upstream_sha}\`"
            echo "- Explicit target: \`${target_explicit}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate target policy
        id: target_policy
        env:
          ALLOW_DOWNGRADE: ${{ inputs.allow_downgrade || false }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          mode="manual"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            mode="scheduled"
          fi

          policy_json="$(
            python3 scripts/codexsdk_target_policy.py \
              --baseline "${CODEXSDK_SCHEMA_BASELINE}/baseline_metadata.json" \
              --target-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --target-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --target-sha "${{ steps.refs.outputs.upstream_sha }}" \
              --target-explicit "${{ steps.refs.outputs.target_explicit }}" \
              --mode "${mode}" \
              --allow-downgrade "${ALLOW_DOWNGRADE}" \
              --json
          )"
          printf '%s\n' "${policy_json}" | tee "${CODEXSDK_TARGET_POLICY_JSON}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path(os.environ["CODEXSDK_TARGET_POLICY_JSON"]).read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key in (
                  "decision",
                  "reason",
                  "baseline_ref_name",
                  "baseline_ref_kind",
                  "baseline_commit",
                  "target_ref_name",
                  "target_ref_kind",
                  "target_commit",
                  "target_explicit",
                  "mode",
              ):
                  output.write(f"{key}={policy[key]}\n")
          PY

          {
            echo
            echo "## Target policy"
            echo
            echo "- Decision: \`$(jq -r '.decision' "${CODEXSDK_TARGET_POLICY_JSON}")\`"
            echo "- Reason: $(jq -r '.reason' "${CODEXSDK_TARGET_POLICY_JSON}")"
            echo "- Baseline target: \`${{ steps.refs.outputs.baseline_sha }}\`"
            echo "- Requested target: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_ref_kind }}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip when target policy is current
        if: steps.target_policy.outputs.decision == 'skip'
        run: |
          echo "Baseline already points at the selected openai/codex upstream target: ${{ steps.refs.outputs.upstream_ref }}." >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when target policy blocks drift detection
        if: steps.target_policy.outputs.decision == 'block'
        run: |
          {
            echo "Protocol drift generation was skipped by target policy."
            echo
            echo "Reason: ${{ steps.target_policy.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when baseline is current
        if: steps.target_policy.outputs.decision == 'skip'
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the checked-in baseline already points at the selected upstream Codex target: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`)."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone upstream Codex
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          git clone --filter=blob:none --no-checkout "${CODEX_UPSTREAM_REPO}" "${CODEXSDK_UPSTREAM_CLONE}"

      - name: Set up Codex Rust
        if: steps.target_policy.outputs.decision == 'allow'
        uses: ./.github/actions/setup-codex-rust
        with:
          cache-key-suffix: ${{ steps.refs.outputs.upstream_short_sha }}
          target-dir: ${{ env.CODEXSDK_RUST_TARGET_DIR }}

      - name: Generate drift report
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          CARGO_TARGET_DIR="$PWD/${CODEXSDK_RUST_TARGET_DIR}" \
            scripts/codexsdk_track_upstream.sh \
            --codex-repo "${CODEXSDK_UPSTREAM_CLONE}" \
            --commit "${{ steps.refs.outputs.upstream_sha }}" \
            --source-ref "${{ steps.refs.outputs.upstream_ref }}" \
            --source-ref-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
            --out "${CODEXSDK_DRIFT_ARTIFACT_DIR}"

      - name: Prepare drift issue
        if: steps.target_policy.outputs.decision == 'allow'
        id: drift
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          reports = Path(os.environ["CODEXSDK_DRIFT_ARTIFACT_DIR"], "reports")
          drift_path = reports / "drift_summary.json"
          drift = json.loads(drift_path.read_text())
          drift_sha = hashlib.sha256(drift_path.read_bytes()).hexdigest()

          baseline = os.environ["BASELINE_SHA"]
          upstream_ref = os.environ["UPSTREAM_REF"]
          upstream_ref_kind = os.environ["UPSTREAM_REF_KIND"]
          upstream = os.environ["UPSTREAM_SHA"]
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          status = drift["status"]
          file_diff = drift["file_diff"]
          method_diff = drift["method_diff"]

          def short_list(items, limit=20):
              if not items:
                  return "_none_"
              lines = [f"- `{item}`" for item in items[:limit]]
              if len(items) > limit:
                  lines.append(f"- ...and {len(items) - limit} more")
              return "\n".join(lines)

          method_lines = []
          for schema, diff in method_diff.items():
              if diff["added"] or diff["removed"]:
                  method_lines.append(f"### {schema}")
                  method_lines.append("")
                  method_lines.append("Added:")
                  method_lines.append(short_list(diff["added"]))
                  method_lines.append("")
                  method_lines.append("Removed:")
                  method_lines.append(short_list(diff["removed"]))
                  method_lines.append("")
          if not method_lines:
              method_lines.append("_No aggregate method additions or removals._")

          upstream_display = f"`{upstream_ref}` (`{upstream}`)"
          title = f"Protocol drift detected against openai/codex {upstream_ref}"
          body = f"""<!-- codexsdk-upstream-sync
          baseline_commit: {baseline}
          upstream_ref: {upstream_ref}
          upstream_ref_kind: {upstream_ref_kind}
          upstream_commit: {upstream}
          drift_sha256: {drift_sha}
          -->

          ## Protocol Drift Detected

          The checked-in Codex app-server schema baseline no longer matches upstream `openai/codex`.

          - Baseline: `openai/codex@{baseline}`
          - Upstream target: {upstream_display}
          - Upstream target kind: `{upstream_ref_kind}`
          - Drift status: `{status}`
          - Drift fingerprint: `{drift_sha}`
          - Workflow run: {run_url}

          ## File Diff

          - Added: {len(file_diff["added"])}
          - Changed: {len(file_diff["changed"])}
          - Removed: {len(file_diff["removed"])}

          ### Added Schemas

          {short_list(file_diff["added"])}

          ### Changed Schemas

          {short_list(file_diff["changed"])}

          ### Removed Schemas

          {short_list(file_diff["removed"])}

          ## Method Diff

          {chr(10).join(method_lines)}

          ## Suggested Local Sync

          ```sh
          scripts/codexsdk_track_upstream.sh \\
            --codex-repo /path/to/openai/codex \\
            --commit {upstream} \\
            --source-ref {upstream_ref} \\
            --source-ref-kind {upstream_ref_kind} \\
            --out /tmp/codexsdk-upstream
          ```

          Then use `$codexsdk-sync-upstream` to review drift, update the checked-in baseline, regenerate `protocolv2`, reconcile handwritten SDK behavior, and run validation.
          """

          comment = f"""Protocol drift is still present.

          - Baseline: `openai/codex@{baseline}`
          - Upstream target: {upstream_display}
          - Upstream target kind: `{upstream_ref_kind}`
          - Drift status: `{status}`
          - Drift fingerprint: `{drift_sha}`
          - Workflow run: {run_url}
          """

          artifact_dir = Path(os.environ["CODEXSDK_DRIFT_ARTIFACT_DIR"])
          Path(artifact_dir, "issue-title.txt").write_text(title + "\n")
          Path(artifact_dir, "issue-body.md").write_text(body)
          Path(artifact_dir, "issue-comment.md").write_text(comment)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"status={status}\n")
              output.write(f"drift_sha={drift_sha}\n")
          PY
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline_sha }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}

      - name: Upload drift reports
        if: steps.target_policy.outputs.decision == 'allow'
        uses: actions/upload-artifact@v7
        with:
          name: codex-upstream-drift-${{ steps.refs.outputs.upstream_sha }}
          path: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}/reports
          if-no-files-found: error

      - name: Update workflow summary
        if: steps.target_policy.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          {
            echo
            echo "- Drift status: \`${{ steps.drift.outputs.status }}\`"
            echo "- Drift fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`"
            echo
            cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/reports/SUMMARY.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when drift is clean
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'clean'
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the selected upstream target has no schema drift. Upstream: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`); fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update drift issue
        if: steps.target_policy.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          gh label create "$label" \
            --description "Upstream Codex app-server protocol drift needs review" \
            --color "BFDADC" \
            --force

          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            existing_drift_sha="$(
              gh issue view "$issue_number" \
                --json body \
                --jq '.body' \
                | sed -n 's/^[[:space:]]*drift_sha256: //p' \
                | head -n 1 \
                | tr -d '\r'
            )"
            title="$(cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-title.txt")"

            gh issue edit "$issue_number" \
              --title "$title" \
              --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-body.md"

            if [[ "$existing_drift_sha" == "${{ steps.drift.outputs.drift_sha }}" ]]; then
              echo "Updated existing drift issue #${issue_number}; fingerprint unchanged, so no comment was added." >> "$GITHUB_STEP_SUMMARY"
            else
              gh issue comment "$issue_number" --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-comment.md"
              echo "Updated existing drift issue #${issue_number} and added a comment for the new fingerprint." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            title="$(cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-title.txt")"
            new_issue_url="$(
              gh issue create \
                --title "$title" \
                --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-body.md" \
                --label "$label"
            )"
            echo "Created drift issue: ${new_issue_url}" >> "$GITHUB_STEP_SUMMARY"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
