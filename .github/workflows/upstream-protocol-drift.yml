name: Codex Upstream Protocol Sync
run-name: "Protocol sync ${{ inputs.upstream_ref || 'latest stable' }}"

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      upstream_ref:
        description: "Optional openai/codex tag, ref, or full SHA. Defaults to the latest stable rust-vX.Y.Z tag."
        required: false
        type: string
      allow_downgrade:
        description: "Allow an explicit stable rust-vX.Y.Z target older than the current stable-tag baseline."
        required: false
        type: boolean
        default: false
      force_compare:
        description: "Generate drift artifacts even when baseline metadata already points at the selected upstream target."
        required: false
        type: boolean
        default: false

defaults:
  run:
    shell: bash

env:
  CODEXSDK_AUTO_SYNC_DIR: .cache/codexsdk-auto-sync
  CODEXSDK_GO_CACHE_DIR: .cache/go-build
  CODEXSDK_GO_MOD_CACHE_DIR: .cache/go-mod
  CODEXSDK_GO_PATH_DIR: .cache/go
  CODEX_UPSTREAM_COMMON_RS: codex-rs/app-server-protocol/src/protocol/common.rs
  CODEX_UPSTREAM_REPO: https://github.com/openai/codex.git
  CODEXSDK_DRIFT_ARTIFACT_DIR: /tmp/codexsdk-upstream
  CODEXSDK_DRIFT_LABEL: protocol-drift
  CODEXSDK_RUST_TARGET_DIR: .cache/cargo-target/codex
  CODEXSDK_SCHEMA_BASELINE: codexsdk/internal/protocolschema/appserver/v2
  CODEXSDK_SYNC_BRANCH_PREFIX: codex/sync-upstream
  CODEXSDK_TARGET_POLICY_JSON: /tmp/codexsdk-target-policy.json
  CODEXSDK_UPSTREAM_CLONE: /tmp/openai-codex
  CODEXSDK_UPSTREAM_TARGET_JSON: /tmp/codexsdk-upstream-target.json

concurrency:
  group: codex-upstream-protocol-drift
  cancel-in-progress: false

jobs:
  detect:
    name: Detect drift and publish sync PR
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Guard control-plane ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "Refusing to run drift control plane from ${GITHUB_REF_NAME}; use ${DEFAULT_BRANCH}." >&2
            exit 1
          fi

      - name: Check out
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Resolve upstream baseline
        id: refs
        env:
          REQUESTED_UPSTREAM_REF: ${{ inputs.upstream_ref || '' }}
        run: |
          set -euo pipefail

          python3 scripts/codexsdk_resolve_upstream.py \
            --remote "${CODEX_UPSTREAM_REPO}" \
            --upstream-ref "${REQUESTED_UPSTREAM_REF}" \
            --json > "${CODEXSDK_UPSTREAM_TARGET_JSON}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          target = json.loads(Path(os.environ["CODEXSDK_UPSTREAM_TARGET_JSON"]).read_text())
          metadata = json.loads(Path(os.environ["CODEXSDK_SCHEMA_BASELINE"], "baseline_metadata.json").read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"upstream_ref={target['upstream_ref']}\n")
              output.write(f"upstream_ref_kind={target['upstream_ref_kind']}\n")
              output.write(f"upstream_sha={target['upstream_sha']}\n")
              output.write(f"upstream_short_sha={target['upstream_sha'][:12]}\n")
              output.write(f"baseline_sha={metadata['source_commit']}\n")
              output.write(f"target_explicit={str(target['target_explicit']).lower()}\n")
          PY

          {
            echo "## Codex upstream protocol drift"
            echo
            echo "- Current phase: \`detect\`"
            echo "- Baseline: \`$(python3 -c 'import json, os; print(json.load(open(os.environ["CODEXSDK_SCHEMA_BASELINE"] + "/baseline_metadata.json"))["source_commit"])')\`"
            echo "- Upstream target: \`$(jq -r '.upstream_ref' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\` (\`$(jq -r '.upstream_ref_kind' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\`)"
            echo "- Upstream commit: \`$(jq -r '.upstream_sha' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\`"
            echo "- Explicit target: \`$(jq -r '.target_explicit' "${CODEXSDK_UPSTREAM_TARGET_JSON}")\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Evaluate target policy
        id: target_policy
        env:
          ALLOW_DOWNGRADE: ${{ inputs.allow_downgrade || false }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          mode="manual"
          if [[ "${GITHUB_EVENT_NAME}" == "schedule" ]]; then
            mode="scheduled"
          fi

          policy_json="$(
            python3 scripts/codexsdk_target_policy.py \
              --baseline "${CODEXSDK_SCHEMA_BASELINE}/baseline_metadata.json" \
              --target-ref "${{ steps.refs.outputs.upstream_ref }}" \
              --target-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
              --target-sha "${{ steps.refs.outputs.upstream_sha }}" \
              --target-explicit "${{ steps.refs.outputs.target_explicit }}" \
              --mode "${mode}" \
              --allow-downgrade "${ALLOW_DOWNGRADE}" \
              --json
          )"
          printf '%s\n' "${policy_json}" | tee "${CODEXSDK_TARGET_POLICY_JSON}"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          policy = json.loads(Path(os.environ["CODEXSDK_TARGET_POLICY_JSON"]).read_text())
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for key in (
                  "decision",
                  "reason",
                  "baseline_ref_name",
                  "baseline_ref_kind",
                  "baseline_commit",
                  "target_ref_name",
                  "target_ref_kind",
                  "target_commit",
                  "target_explicit",
                  "mode",
              ):
                  output.write(f"{key}={policy[key]}\n")
          PY

          {
            echo
            echo "## Target policy"
            echo
            echo "- Decision: \`$(jq -r '.decision' "${CODEXSDK_TARGET_POLICY_JSON}")\`"
            echo "- Reason: $(jq -r '.reason' "${CODEXSDK_TARGET_POLICY_JSON}")"
            echo "- Baseline target: \`${{ steps.refs.outputs.baseline_sha }}\`"
            echo "- Requested target: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_ref_kind }}\`)"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Select drift action
        id: drift_action
        env:
          FORCE_COMPARE: ${{ inputs.force_compare || false }}
        run: |
          set -euo pipefail

          decision="${{ steps.target_policy.outputs.decision }}"
          reason="${{ steps.target_policy.outputs.reason }}"
          if [[ "${decision}" == "skip" && "${FORCE_COMPARE}" == "true" ]]; then
            decision="allow"
            reason="force_compare requested; generating verification drift artifacts"
          fi

          {
            echo "decision=${decision}"
            echo "reason=${reason}"
          } >> "$GITHUB_OUTPUT"

          {
            echo
            echo "## Drift action"
            echo
            echo "- Effective decision: \`${decision}\`"
            echo "- Reason: ${reason}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip when target policy is current
        if: steps.drift_action.outputs.decision == 'skip'
        run: |
          echo "Baseline already points at the selected openai/codex upstream target: ${{ steps.refs.outputs.upstream_ref }}." >> "$GITHUB_STEP_SUMMARY"

      - name: Stop when target policy blocks drift detection
        if: steps.drift_action.outputs.decision == 'block'
        run: |
          {
            echo "Protocol drift generation was skipped by target policy."
            echo
            echo "Reason: ${{ steps.drift_action.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when baseline is current
        if: steps.drift_action.outputs.decision == 'skip'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the checked-in baseline already points at the selected upstream Codex target: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`)."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Clone upstream Codex
        if: steps.drift_action.outputs.decision == 'allow'
        run: |
          git clone --filter=blob:none --no-checkout "${CODEX_UPSTREAM_REPO}" "${CODEXSDK_UPSTREAM_CLONE}"

      - name: Set up Codex Rust
        if: steps.drift_action.outputs.decision == 'allow'
        uses: ./.github/actions/setup-codex-rust
        with:
          cache-key-suffix: ${{ steps.refs.outputs.upstream_short_sha }}
          target-dir: ${{ env.CODEXSDK_RUST_TARGET_DIR }}

      - name: Generate drift report
        if: steps.drift_action.outputs.decision == 'allow'
        run: |
          CARGO_TARGET_DIR="$PWD/${CODEXSDK_RUST_TARGET_DIR}" \
            scripts/codexsdk_track_upstream.sh \
            --codex-repo "${CODEXSDK_UPSTREAM_CLONE}" \
            --commit "${{ steps.refs.outputs.upstream_sha }}" \
            --source-ref "${{ steps.refs.outputs.upstream_ref }}" \
            --source-ref-kind "${{ steps.refs.outputs.upstream_ref_kind }}" \
            --out "${CODEXSDK_DRIFT_ARTIFACT_DIR}"

      - name: Capture upstream response mappings
        if: steps.drift_action.outputs.decision == 'allow'
        run: |
          git -C "${CODEXSDK_UPSTREAM_CLONE}" show \
            "${{ steps.refs.outputs.upstream_sha }}:${CODEX_UPSTREAM_COMMON_RS}" \
            > "${CODEXSDK_DRIFT_ARTIFACT_DIR}/common.rs"
          printf '%s\n' "${{ steps.refs.outputs.upstream_sha }}" \
            > "${CODEXSDK_DRIFT_ARTIFACT_DIR}/common.rs.source_sha"

      - name: Prepare drift issue
        if: steps.drift_action.outputs.decision == 'allow'
        id: drift
        env:
          BASELINE_SHA: ${{ steps.refs.outputs.baseline_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          python3 scripts/codexsdk_write_drift_issue_artifacts.py \
            --artifact-dir "${CODEXSDK_DRIFT_ARTIFACT_DIR}" \
            --baseline-sha "${BASELINE_SHA}" \
            --run-url "${RUN_URL}" \
            --upstream-ref "${UPSTREAM_REF}" \
            --upstream-ref-kind "${UPSTREAM_REF_KIND}" \
            --upstream-sha "${UPSTREAM_SHA}"

      - name: Upload drift evidence
        if: steps.drift_action.outputs.decision == 'allow'
        uses: actions/upload-artifact@v7
        with:
          name: codex-upstream-drift-${{ steps.refs.outputs.upstream_sha }}-${{ steps.drift.outputs.drift_sha }}
          path: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          if-no-files-found: error

      - name: Update workflow summary
        if: steps.drift_action.outputs.decision == 'allow'
        run: |
          set -euo pipefail
          {
            echo
            echo "- Drift status: \`${{ steps.drift.outputs.status }}\`"
            echo "- Drift fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`"
            echo "- Drift evidence artifact: \`codex-upstream-drift-${{ steps.refs.outputs.upstream_sha }}-${{ steps.drift.outputs.drift_sha }}\`"
            echo
            cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/reports/SUMMARY.md"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Close drift issue when drift is clean
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'clean' && !inputs.force_compare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            gh issue close "$issue_number" \
              --reason completed \
              --comment "Closing because the selected upstream target has no schema drift. Upstream: \`${{ steps.refs.outputs.upstream_ref }}\` (\`${{ steps.refs.outputs.upstream_sha }}\`); fingerprint: \`${{ steps.drift.outputs.drift_sha }}\`."
            echo "Closed resolved drift issue #${issue_number}." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No open protocol drift issue to close." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create or update drift issue
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required'
        id: issue_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          label="${CODEXSDK_DRIFT_LABEL}"
          gh label create "$label" \
            --description "Upstream Codex app-server protocol drift needs review" \
            --color "BFDADC" \
            --force

          issue_number="$(
            gh issue list \
              --state open \
              --label "$label" \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [[ -n "$issue_number" ]]; then
            existing_drift_sha="$(
              gh issue view "$issue_number" \
                --json body \
                --jq '.body' \
                | sed -n 's/^[[:space:]]*drift_sha256: //p' \
                | head -n 1 \
                | tr -d '\r'
            )"
            title="$(cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-title.txt")"

            gh issue edit "$issue_number" \
              --title "$title" \
              --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-body.md"

            if [[ "$existing_drift_sha" == "${{ steps.drift.outputs.drift_sha }}" ]]; then
              echo "Updated existing drift issue #${issue_number}; fingerprint unchanged, so no comment was added." >> "$GITHUB_STEP_SUMMARY"
            else
              gh issue comment "$issue_number" --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-comment.md"
              echo "Updated existing drift issue #${issue_number} and added a comment for the new fingerprint." >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            title="$(cat "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-title.txt")"
            new_issue_url="$(
              gh issue create \
                --title "$title" \
                --body-file "${CODEXSDK_DRIFT_ARTIFACT_DIR}/issue-body.md" \
                --label "$label"
            )"
            issue_number="${new_issue_url##*/}"
            echo "Created drift issue: ${new_issue_url}" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        run: |
          git config user.name "codexsdk-sync-bot"
          git config user.email "codexsdk-sync-bot@users.noreply.github.com"

      - name: Apply sync candidate mechanically
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${CODEXSDK_AUTO_SYNC_DIR}"
          python3 scripts/codexsdk_apply_sync_candidate.py \
            --candidate "${CANDIDATE_DIR}/schema" \
            --codex-repo "${CODEXSDK_UPSTREAM_CLONE}" \
            --reports "${CANDIDATE_DIR}/reports" \
            --common-rs "${CANDIDATE_DIR}/common.rs" \
            --common-rs-source-sha "${UPSTREAM_SHA}" \
            --target-ref "${UPSTREAM_REF}" \
            --target-kind "${UPSTREAM_REF_KIND}" \
            --target-sha "${UPSTREAM_SHA}" \
            --json | tee "${CODEXSDK_AUTO_SYNC_DIR}/apply-result.json"
          git diff --name-status > "${CODEXSDK_AUTO_SYNC_DIR}/diff-name-status.txt"

      - name: Build Codex drift repair prompt
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          LAND_REF: ${{ github.event.repository.default_branch }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          mkdir -p "${CODEXSDK_AUTO_SYNC_DIR}"
          python3 scripts/codexsdk_write_sync_prompt.py \
            --out "${CODEXSDK_AUTO_SYNC_DIR}/prompt.md" \
            --auto-sync-dir "${CODEXSDK_AUTO_SYNC_DIR}" \
            --candidate-dir "${CANDIDATE_DIR}" \
            --land-ref "${LAND_REF}" \
            --phase "fix" \
            --upstream-ref "${UPSTREAM_REF}" \
            --upstream-ref-kind "${UPSTREAM_REF_KIND}" \
            --upstream-sha "${UPSTREAM_SHA}"

      - name: Prepare Go validation cache for Codex repair
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          GOCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_CACHE_DIR }}
          GOMODCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_MOD_CACHE_DIR }}
          GOPATH: ${{ github.workspace }}/${{ env.CODEXSDK_GO_PATH_DIR }}
        run: |
          set -euo pipefail
          mkdir -p "${GOCACHE}" "${GOMODCACHE}" "${GOPATH}"
          GOWORK=off go list -deps -test ./... >/dev/null

      - name: Run Codex drift repair agent
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        uses: openai/codex-action@v1
        env:
          CARGO_TARGET_DIR: ${{ github.workspace }}/${{ env.CODEXSDK_RUST_TARGET_DIR }}
          GOCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_CACHE_DIR }}
          GOMODCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_MOD_CACHE_DIR }}
          GOPATH: ${{ github.workspace }}/${{ env.CODEXSDK_GO_PATH_DIR }}
        with:
          openai-api-key: ${{ secrets.AZURE_OPENAI_API_KEY }}
          responses-api-endpoint: ${{ secrets.CODEX_RESPONSES_API_ENDPOINT }}
          model: ${{ secrets.CODEX_MODEL }}
          prompt-file: ${{ env.CODEXSDK_AUTO_SYNC_DIR }}/prompt.md
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-bots: "true"
          codex-args: '["--ephemeral"]'

      - name: Validate sync before commit
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          GOCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_CACHE_DIR }}
          GOMODCACHE: ${{ github.workspace }}/${{ env.CODEXSDK_GO_MOD_CACHE_DIR }}
          GOPATH: ${{ github.workspace }}/${{ env.CODEXSDK_GO_PATH_DIR }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          scripts/codexsdk_validate_sync.sh \
            --candidate "${CANDIDATE_DIR}/schema" \
            --target-sha "${UPSTREAM_SHA}"

      - name: Commit local sync changes
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          echo "Using codexsdk-sync-upstream command: commit-local-sync."
          git diff --name-status
          if git diff --quiet; then
            echo "Codex sync produced no file changes while drift was review-required." >&2
            exit 1
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "No staged sync changes are available to commit." >&2
            exit 1
          fi
          git commit \
            -m "Sync Codex protocol baseline to ${UPSTREAM_REF}" \
            -m "Upstream-ref: ${UPSTREAM_REF}" \
            -m "Upstream-ref-kind: ${UPSTREAM_REF_KIND}" \
            -m "Upstream-commit: ${UPSTREAM_SHA}"

      - name: Publish protected sync PR
        id: publish
        if: steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status == 'review-required' && !inputs.force_compare
        env:
          CANDIDATE_DIR: ${{ env.CODEXSDK_DRIFT_ARTIFACT_DIR }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          DRIFT_SHA: ${{ steps.drift.outputs.drift_sha }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue_state.outputs.issue_number }}
          UPSTREAM_REF: ${{ steps.refs.outputs.upstream_ref }}
          UPSTREAM_REF_KIND: ${{ steps.refs.outputs.upstream_ref_kind }}
          UPSTREAM_SHA: ${{ steps.refs.outputs.upstream_sha }}
        run: |
          set -euo pipefail
          args=(
            --land-ref "${DEFAULT_BRANCH}"
            --default-branch "${DEFAULT_BRANCH}"
            --branch-prefix "${CODEXSDK_SYNC_BRANCH_PREFIX}"
            --target-ref "${UPSTREAM_REF}"
            --target-kind "${UPSTREAM_REF_KIND}"
            --target-sha "${UPSTREAM_SHA}"
            --drift-sha "${DRIFT_SHA}"
            --drift-analysis "${CANDIDATE_DIR}/issue-body.md"
            --candidate "${CANDIDATE_DIR}/schema"
          )
          if [[ -n "${ISSUE_NUMBER}" ]]; then
            args+=(--issue-number "${ISSUE_NUMBER}")
          fi
          scripts/codexsdk_publish_sync_pr.sh "${args[@]}"

      - name: Report sync PR outcome
        if: steps.publish.outputs.pr_url != ''
        env:
          PR_URL: ${{ steps.publish.outputs.pr_url }}
          SYNC_BRANCH: ${{ steps.publish.outputs.sync_branch }}
          SYNC_COMMIT: ${{ steps.publish.outputs.sync_commit }}
        run: |
          {
            echo
            echo "## Sync PR published"
            echo
            echo "- Completion layer: \`sync PR published\`"
            echo "- Sync branch: \`${SYNC_BRANCH}\`"
            echo "- Sync commit: \`${SYNC_COMMIT}\`"
            echo "- Sync PR: ${PR_URL}"
            echo
            echo "Branch protection, the required \`Go\` check, and repository auto-merge rules own the merge decision. The finalize workflow owns landed verification, sync tags, and issue closure."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail verification when drift remains
        if: inputs.force_compare && steps.drift_action.outputs.decision == 'allow' && steps.drift.outputs.status != 'clean'
        run: |
          echo "force_compare verification found drift status '${{ steps.drift.outputs.status }}'; issue state was updated before failing." >&2
          exit 1
