name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Check module metadata
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Check formatting
        run: test -z "$(git ls-files -z -- '*.go' ':!:vendor/**' | xargs -0 gofmt -l)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test scripts
        run: python3 -m unittest discover -s scripts -p '*_test.py'

      - name: Check generated protocol code
        run: |
          tmp="$(mktemp -d)"
          go run ./codexsdk/internal/cmd/protocolv2gen -out "$tmp"
          diff -u codexsdk/protocolv2/method_registry.gen.go "$tmp/method_registry.gen.go"
          diff -u codexsdk/protocolv2/protocol_types.gen.go "$tmp/protocol_types.gen.go"
