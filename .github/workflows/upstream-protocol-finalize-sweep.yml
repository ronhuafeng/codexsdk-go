name: Codex Upstream Protocol Finalize Sweep
run-name: "Protocol finalize sweep"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

defaults:
  run:
    shell: bash

concurrency:
  group: codex-upstream-protocol-finalize-sweep
  cancel-in-progress: false

jobs:
  sweep:
    name: Dispatch pending finalize workflow
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: write
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Guard control-plane ref
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_NAME}" != "${DEFAULT_BRANCH}" ]]; then
            echo "Refusing to run finalize sweep control plane from ${GITHUB_REF_NAME}; use ${DEFAULT_BRANCH}." >&2
            exit 1
          fi

      - name: Check out control-plane ref
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Discover pending finalize candidate
        id: candidate
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          default_head="$(
            gh api "repos/${GITHUB_REPOSITORY}/branches/${DEFAULT_BRANCH}" \
              --jq '.commit.sha'
          )"
          export DEFAULT_HEAD="${default_head}"
          echo "Default branch ${DEFAULT_BRANCH} head: ${default_head}" >> "$GITHUB_STEP_SUMMARY"

          active_finalize_runs="$(
            {
              gh run list \
                --workflow upstream-protocol-finalize.yml \
                --branch "${DEFAULT_BRANCH}" \
                --status queued \
                --limit 20 \
                --json databaseId,status,url
              gh run list \
                --workflow upstream-protocol-finalize.yml \
                --branch "${DEFAULT_BRANCH}" \
                --status in_progress \
                --limit 20 \
                --json databaseId,status,url
            } | jq -s 'add'
          )"
          printf '%s\n' "${active_finalize_runs}" > /tmp/codexsdk-active-finalize-runs.json

          gh pr list \
            --state merged \
            --base "${DEFAULT_BRANCH}" \
            --limit 50 \
            --json number,body,mergeCommit,url \
            > /tmp/codexsdk-merged-prs.json

          python3 scripts/codexsdk_finalize_sweep.py \
            --active-runs-json /tmp/codexsdk-active-finalize-runs.json \
            --default-branch "${DEFAULT_BRANCH}" \
            --default-head "${DEFAULT_HEAD}" \
            --merged-prs-json /tmp/codexsdk-merged-prs.json

      - name: Dispatch finalize workflow
        if: steps.candidate.outputs.dispatch == 'true'
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.candidate.outputs.issue_number }}
          PR_NUMBER: ${{ steps.candidate.outputs.pr_number }}
        run: |
          set -euo pipefail

          gh workflow run upstream-protocol-finalize.yml \
            --ref "${DEFAULT_BRANCH}" \
            -f "pr_number=${PR_NUMBER}" \
            -f "issue_number=${ISSUE_NUMBER}"

          echo "Dispatched finalize workflow for PR #${PR_NUMBER} and issue #${ISSUE_NUMBER}." >> "$GITHUB_STEP_SUMMARY"
