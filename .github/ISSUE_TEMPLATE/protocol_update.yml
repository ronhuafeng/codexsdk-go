name: Protocol update
description: Track an upstream Codex app-server protocol baseline update.
title: "protocol: update baseline to <tag-or-ref>"
labels: ["protocol", "maintenance"]
body:
  - type: input
    id: upstream_ref
    attributes:
      label: Upstream Codex tag, ref, or commit
      placeholder: rust-v0.140.0
    validations:
      required: true
  - type: textarea
    id: drift_summary
    attributes:
      label: Drift summary
      description: Summarize added, changed, removed, and experimental protocol surface.
    validations:
      required: true
  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      value: |
        - [ ] Ran `scripts/codexsdk_target_policy.py` and confirmed the target is allowed.
        - [ ] Generated schema with `scripts/codexsdk_track_upstream.sh`.
        - [ ] Recorded upstream tag/ref provenance and peeled commit.
        - [ ] Classified drift as metadata-only, generated-only, public-facade-required, or ignored-internal.
        - [ ] Reviewed manifest and coverage matrix changes.
        - [ ] Updated generated protocolv2 Go files.
        - [ ] Kept handwritten SDK changes limited to reviewed public surface or compatibility fixes.
        - [ ] Updated NOTICE if needed.
        - [ ] Audited `git diff --name-status` for unrelated files and stale entries.
        - [ ] Ran tests and generated-code reproducibility checks.
