name: Bug report
description: Report a reproducible problem in codexsdk-go.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include a minimal Go test, fake transport case, or opt-in real app-server command.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Go version, OS, codexsdk-go version, Codex CLI version, and whether experimental API was enabled.
    validations:
      required: true
